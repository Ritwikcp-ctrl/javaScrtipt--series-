    // we use the best method :
    document.getElementById('owl').addEvenListener('click', function () {
        alert(`owl is clicked`)
    }, false)

    document.gerElementById('dog').addEventListener('click', function (e) {
        console.log(e)
    },) //by default it comes to false here , as it is event bubbling .

//^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
 //here we are using false that is default on(event bubbling ) do first 
 //means it track inside to ouside (so first clicked inside the ul on any li text and then ul id will be printed)
    document.getElementById('text').addEventListener('click',function(e){
        alert(` this is clicked on the ul id `)
    },false)

    document.getElementById('owl').addEventListener('click',function(e){
        alert(`we clicked  inside the ul on any li text `)
        e.stopPropagation()
    },false)

    //if we write true here (which is event capturing ) so first cicked on ul id and then inside the ul on any li text as it tracks the outside to inside .

    //In order to prevent the propagation use the property (e.stopPropagation())
</script>
