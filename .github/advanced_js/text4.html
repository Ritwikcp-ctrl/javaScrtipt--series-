<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul class="language">
        <li>javascript</li>

    </ul>

</body>
<script>
    function addLanguage(langName) {
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
        //using this innerHTML traverse the whole tree, means it is not optimized
    }

    addLanguage("cpp")
    addLanguage("typescript")


    function addOptiLanguage(name) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(name))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("golang")

    //edit the list 

    const secongLang = document.querySelector("li:nth-child(2)")
    //secondLang.innerHTML = "mojo"
    const newli = document.createElement("li")
    newli.textContent = "mojo"
    secondLang.replaceWith(newli)

    //edit
    const firstlang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li> Tyotio</li>'

    //remove
    const last = document.querySelector("li:last-chid")
    last.remove()
</script>

</html>
